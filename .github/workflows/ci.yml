# ============================================================
# SmartCycle — CI/CD Pipeline
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Backend Checks ---
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (Ruff)
        continue-on-error: true
        run: ruff check app/ tests/ --format=github

      - name: Type check (MyPy)
        continue-on-error: true
        run: mypy app/ --ignore-missing-imports || true

      - name: Run tests (standalone runner)
        run: PYTHONPATH=. python tests/run_tests.py

      - name: Run tests (pytest — requires pip install)
        continue-on-error: true
        run: pytest -v --cov=app --cov-report=term-missing --suppress-no-test-exit-code || true

  # --- Frontend Checks ---
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        continue-on-error: true
        run: npm run typecheck || true

      - name: Run tests
        continue-on-error: true
        run: npx vitest run --reporter=verbose || true

      - name: Build
        run: npm run build
